name: 缺陷反馈
description: 提交 bug、异常或回归问题
labels: ["type/bug", "status/draft"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 问题出现在什么场景？
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
